# PLICP激光雷达里程计配置文件 - ROS2版本
# 
# 此文件定义了PLICP算法和关键帧检测的所有可调参数
# 根据具体的机器人平台和应用环境调整这些参数以获得最佳性能

# ============================================================================
# 节点基本配置
# ============================================================================
plicp_odometry:
  ros__parameters:
    
    # ========================================================================
    # 坐标系配置
    # ========================================================================
    odom_frame: "odom"          # 里程计坐标系名称
    base_frame: "base_footprint"     # 机器人基座坐标系名称

    # ========================================================================
    # 关键帧检测参数
    # ========================================================================
    # 关键帧策略控制何时更新参考扫描帧，影响计算效率和精度的平衡

    kf_dist_linear: 0.1         # 线性运动阈值 (m)
                                # 当机器人移动距离超过此值时触发关键帧更新
                                # 较小值: 更高精度，更多计算量
                                # 较大值: 更少计算量，可能降低精度

    kf_dist_angular: 0.087      # 角度运动阈值 (弧度，约5度)  
                                # 当机器人旋转角度超过此值时触发关键帧更新
                                # 对于转弯较多的环境应使用较小值

    kf_scan_count: 10           # 强制关键帧更新间隔
                                # 无论运动量如何，每隔N帧强制更新一次关键帧
                                # 防止在静止状态下累积误差

    # ========================================================================
    # PLICP算法核心参数
    # ========================================================================

    # 运动约束参数 - 限制单次匹配的最大变化量
    max_angular_correction_deg: 45.0    # 最大角度修正 (度)
    max_linear_correction: 1.0          # 最大平移修正 (m)

    # 迭代收敛参数
    max_iterations: 10                  # 最大迭代次数
                                       # 增加可提高精度但会增加计算时间

    epsilon_xy: 0.000001               # 平移收敛阈值 (m)
                                       # 连续迭代间平移变化小于此值时停止

    epsilon_theta: 0.000001            # 旋转收敛阈值 (弧度)
                                       # 连续迭代间旋转变化小于此值时停止

    # 对应点匹配参数
    max_correspondence_dist: 1.0        # 最大对应距离 (m)
                                       # 超过此距离的点对不被考虑为对应关系

    sigma: 0.010                       # 激光测量噪声标准差 (m)
                                       # 根据激光雷达精度调整

    # ========================================================================
    # 高级算法参数
    # ========================================================================

    # 对应点查找优化
    use_corr_tricks: 1                 # 是否使用智能对应点查找技巧
                                       # 1: 启用优化算法，0: 使用朴素方法

    # 点到线距离vs点到点距离  
    use_point_to_line_distance: 1      # 1: 使用点到线距离（PLICP特色）
                                       # 0: 使用传统点到点距离（标准ICP）

    # 异常值检测和处理
    outliers_maxPerc: 0.90             # 保留对应点的百分比
                                       # 0.9 表示保留90%误差最小的对应点

    outliers_adaptive_order: 0.7       # 自适应阈值百分位数
    outliers_adaptive_mult: 2.0        # 自适应阈值倍数

    outliers_remove_doubles: 1         # 移除重复的对应关系

    # 角度测试 - 基于入射角丢弃不可靠的对应点
    do_alpha_test: 0                   # 是否启用角度测试
    do_alpha_test_thresholdDeg: 20.0   # 角度测试阈值 (度)

    # 可见性测试 - 预测位置的几何可见性检查
    do_visibility_test: 0              # 是否启用可见性测试

    # 聚类和方向估计
    clustering_threshold: 0.25         # 聚类最大距离 (m)
    orientation_neighbourhood: 20      # 方向估计邻域大小

    # ========================================================================
    # 重启和错误恢复参数
    # ========================================================================
    restart: 0                         # 是否启用自动重启机制
    restart_threshold_mean_error: 0.01 # 重启的平均误差阈值
    restart_dt: 1.0                    # 重启的位移阈值 (m)  
    restart_dtheta: 0.1                # 重启的角度阈值 (弧度)

    # ========================================================================
    # 调试和协方差计算
    # ========================================================================
    do_compute_covariance: 0           # 是否计算协方差矩阵
    debug_verify_tricks: 0             # 是否验证对应点查找算法

    # 加权方案
    use_ml_weights: 0                  # 是否使用最大似然加权
    use_sigma_weights: 0               # 是否使用测量噪声加权

# ============================================================================
# 参数调优建议
# ============================================================================
#
# 室内结构化环境:
#   - kf_dist_linear: 0.05-0.1
#   - max_correspondence_dist: 0.3-0.5
#   - use_point_to_line_distance: 1
#
# 室外开阔环境:
#   - kf_dist_linear: 0.2-0.5  
#   - max_correspondence_dist: 1.0-2.0
#   - max_iterations: 15-20
#
# 高速运动:
#   - kf_scan_count: 5-8
#   - max_linear_correction: 2.0-5.0
#   - max_angular_correction_deg: 90-180
#
# 低计算能力平台:
#   - max_iterations: 5-8
#   - kf_dist_linear: 0.2
#   - use_corr_tricks: 1
